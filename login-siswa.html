<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk Kelas | Saku pintar</title>
    <link rel="stylesheet" href="shared/css/global.css">
    <style>
        html, body {
            overscroll-behavior: none;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #85C1E9;
            font-family: var(--font-student);
            margin: 0;
            overflow-x: hidden;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('shared/assets/bg-pantai.png');
            background-size: cover;
            background-position: center bottom;
            background-repeat: no-repeat;
            z-index: -2;
            pointer-events: none;
        }

        /* Overlay Siswa di Bawah Layar */
        body::after {
            content: "";
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100vw;
            height: 40vh; /* Sesuaikan agar proporsional */
            background-image: url('shared/assets/overlay-siswa.png');
            background-size: contain;
            background-position: center bottom;
            background-repeat: no-repeat;
            z-index: 1;
            pointer-events: none;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 40px;
            border-radius: 40px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.15), inset 0 0 15px rgba(255, 255, 255, 0.4);
            text-align: center;
            max-width: 400px;
            width: 90%;
            border: 2px solid rgba(255, 255, 255, 0.5);
            animation: popUp 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            z-index: 2;
        }
        @keyframes popUp {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .login-card h1 {
            color: #10c2e2;
            margin-bottom: 25px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 0px #0b849b;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-dark);
            font-weight: bold;
        }
        .form-control {
            width: 100%;
            padding: 15px;
            border: 3px solid #E5E7EB;
            border-radius: 15px;
            font-size: 1.1rem;
            transition: all 0.2s;
            font-family: var(--font-student);
        }
        .form-control:focus {
            outline: none;
            border-color: #F1C40F;
            box-shadow: 0 0 0 4px rgba(241, 196, 15, 0.2);
        }
        .btn-login {
            width: 100%;
            padding: 15px;
            font-size: 1.2rem;
            margin-top: 10px;
            border-radius: 20px;
            box-shadow: 0 8px 0 #D4AC0D;
            transition: all 0.1s;
            background-color: var(--accent-color);
            color: var(--text-dark);
            border: none;
            cursor: pointer;
            font-weight: bold;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        .btn-login:active {
            transform: translateY(8px) scale(0.98);
            box-shadow: 0 0 0 #D4AC0D;
        }
        .error-msg {
            color: #E74C3C;
            font-weight: bold;
            margin-bottom: 15px;
            display: none;
            background: #FADBD8;
            padding: 10px;
            border-radius: 10px;
            animation: shake 0.4s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .btn-back {
            display: block;
            margin-top: 25px;
            color: #7F8C8D;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
        }
        
        /* Penyesuaian Responsif untuk Mobile */
        @media (max-width: 768px) {
            body::after {
                height: 25vh; /* Tinggi diperbesar agar karakter terlihat jelas */
                /* Membagi 1 gambar panjang menjadi 2 sisi (kiri & kanan) agar bagian kosong di tengah tidak memakan tempat di HP */
                background-image: url('shared/assets/overlay-siswa.png'), url('shared/assets/overlay-siswa.png');
                background-position: left bottom, right bottom;
                background-size: auto 100%, auto 100%;
                background-repeat: no-repeat, no-repeat;
            }
            .login-card {
                position: relative;
                z-index: 2;
                padding: 30px 20px;
            }
            .login-card h1 {
                font-size: 2rem;
            }
            .btn-login {
                font-size: 1.1rem;
                padding: 12px;
            }
        }
    </style>
</head>
<body ontouchstart="">
    <div class="login-card">
        <h1>Masuk Kelas</h1>
        <form id="loginSiswaForm">
            <div class="form-group">
                <label for="namaSiswa">Nama Panggilan:</label>
                <input type="text" id="namaSiswa" class="form-control" placeholder="Contoh: Budi" required autocomplete="off">
            </div>
            <div class="form-group">
                <label for="kelasSiswa">Kelas:</label>
                <input type="text" id="kelasSiswa" class="form-control" placeholder="Contoh: 3A" required autocomplete="off">
            </div>
            <button type="submit" class="btn-login">Mulai Bermain!</button>
        </form>
        <a href="index.html" class="btn-back">Kembali ke Portal</a>
    </div>

    <!-- Script Utama (tanpa utils dulu agar tidak kena redirect global) -->
    <script>
        document.getElementById('loginSiswaForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const nama = document.getElementById('namaSiswa').value.trim();
            const kelas = document.getElementById('kelasSiswa').value.trim();
            
            if(nama && kelas) {
                // Mainkan suara sukses jika ada
                const sfxSave = new Audio('klik semua.mp3');
                sfxSave.play().catch(err=>{});

                // Simpan ke Session Storage
                sessionStorage.setItem('siswaAuth', JSON.stringify({ nama, kelas }));
                
                // Pindah ke dashboard siswa
                setTimeout(() => {
                    window.location.href = 'student/index.html';
                }, 50);
            }
        });
    </script>
</body>
</html>
