<!DOCTYPE html>
<html lang="id">
<head>
    <script>
if (!sessionStorage.getItem('siswaAuth')) window.location.replace('../login-siswa.html');
</script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Instruksi Belanja | Saku Pintar</title>
    <link rel="stylesheet" href="../shared/css/global.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'League Spartan', sans-serif;
            background-color: black;
            user-select: none;
        }

        #game-bg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: background-image 1s ease-in-out;
            z-index: 1;
        }

        .overlay-bg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 2;
            transition: background 1s ease;
        }

        #scene-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 3;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none; /* Let the click area catch clicks */
        }

        /* Karakter Peri */
        #fairy-container {
            position: absolute;
            bottom: -50px;
            left: 5%;
            height: 80%;
            transition: all 1s ease-in-out;
            animation: floatFairy 3s ease-in-out infinite;
            opacity: 0;
            transform: translateY(50px);
        }
        
        #fairy-container.show {
            opacity: 1;
            transform: translateY(0);
        }

        #fairy-container img {
            height: 100%;
            max-height: 500px;
            object-fit: contain;
        }

        @keyframes floatFairy {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* Balon Chat di Tengah */
        #speech-bubble {
            background: #ffffff;
            border: 5px solid #FF9F43;
            border-radius: 30px;
            padding: 30px;
            width: 50%;
            max-width: 600px;
            position: absolute;
            left: 40%; /* Geser ke kanan sedikit agar tidak menabrak peri */
            top: 50%;
            transform: translateY(-50%) scale(0.8);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #speech-bubble.show {
            opacity: 1;
            transform: translateY(-50%) scale(1);
            pointer-events: auto;
        }

        /* Panah Balon Kata mengarah ke Peri */
        #speech-bubble::before {
            content: '';
            position: absolute;
            top: 50%;
            left: -25px; 
            transform: translateY(-50%);
            border-width: 20px 30px 20px 0;
            border-style: solid;
            border-color: transparent #FF9F43 transparent transparent;
        }
        #speech-bubble::after {
            content: '';
            position: absolute;
            top: 50%;
            left: -18px;
            transform: translateY(-50%);
            border-width: 15px 23px 15px 0;
            border-style: solid;
            border-color: transparent #ffffff transparent transparent;
        }

        #speaker-name {
            display: inline-block;
            background: #FF9F43;
            color: white;
            padding: 5px 20px;
            border-radius: 20px;
            font-size: 1.2rem;
            font-weight: 800;
            margin-bottom: 15px;
            margin-top: -50px; /* Tarik ke atas menabrak border */
            border: 3px solid white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-transform: uppercase;
        }

        #dialogue-text {
            font-size: 1.5rem;
            line-height: 1.6;
            color: #2C3E50;
            margin: 0;
            min-height: 100px;
            font-weight: 600;
        }

        #continue-hint {
            text-align: right;
            font-size: 1rem;
            color: #7F8C8D;
            margin-top: 15px;
            animation: blink 1.5s infinite;
            font-weight: bold;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .btn-mulai {
            display: block;
            margin: 20px auto 0 auto;
            text-align: center;
            padding: 15px 30px;
            background: #27AE60;
            color: white;
            text-decoration: none;
            font-size: 1.4rem;
            font-weight: bold;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            box-shadow: 0 6px 0 #1E8449;
            transition: all 0.2s;
            animation: pulse 2s infinite;
            width: max-content;
            pointer-events: auto;
        }
        
        .btn-mulai:active {
            transform: translateY(6px);
            box-shadow: none;
        }

        /* Area klik transparan di atas segalanya */
        #click-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
            cursor: pointer;
        }

        /* Peringatan Wajib Landscape */
        #landscape-warning {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #2C3E50;
            color: white;
            z-index: 99999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
        #landscape-warning .phone-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            animation: rotatePhone 2s infinite ease-in-out;
        }
        @keyframes rotatePhone {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(-90deg); }
            100% { transform: rotate(-90deg); }
        }
        @media screen and (max-width: 768px) and (orientation: portrait) {
            #landscape-warning { display: flex; }
        }

        /* Responsif kecil */
        @media screen and (max-width: 800px) {
            #speech-bubble {
                width: 60%;
                left: 35%;
                padding: 20px;
            }
            #dialogue-text { font-size: 1.2rem; }
            #fairy-container { left: 0; }
        }
    
        @keyframes bounceIndicator {
            from { transform: translateY(0); }
            to { transform: translateY(-20px); }
        }
        @keyframes pulseRed {
            from { transform: scale(1); box-shadow: 0 0 10px #E74C3C; }
            to { transform: scale(1.1); box-shadow: 0 0 30px #E74C3C; }
        }
\n    </style>
</head>
<body>

    <!-- Overlay Wajib Landscape -->
    <div id="landscape-warning">
        <div class="phone-icon">📱</div>
        <h2 style="margin-bottom: 15px;">Putar Layar HP Kamu!</h2>
        <p style="font-size: 1.1rem; line-height: 1.5;">Layar ini wajib menggunakan posisi mendatar (Landscape).</p>
        <button id="btnForceLandscape" style="display: inline-block; padding: 15px 30px; font-size: 1.2rem; background: #8E44AD; color: white; border: none; border-radius: 30px; margin-top: 20px; cursor: pointer; box-shadow: 0 5px 0 #732D91; font-weight: bold; font-family: 'League Spartan', sans-serif;">Putar Layar (Layar Penuh)</button>
    </div>

    <!-- Background Interaktif -->
    <div id="game-bg"></div>
    <div class="overlay-bg"></div>

    
    
    <!-- Mock Kasir (Behind the speech bubble) -->
    <div id="mock-kasir-wrapper" style="opacity: 0; transition: opacity 1s ease; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none;">
        <div id="mock-kasir" style="position: absolute; bottom: -20px; right: 5%; width: 25%; max-width: 250px; display: flex; flex-direction: column; align-items: center; transition: all 0.5s ease;">
            <img src="aset student/8.png" style="width: 100%; max-height: 250px; object-fit: contain; margin-bottom: -50px; z-index: 1;">
            <div style="width: 130%; height: 180px; background: linear-gradient(to bottom, #A0522D, #8B4513); border-top: 8px solid #CD853F; border-radius: 8px 8px 0 0; position: relative; z-index: 2; display: flex; justify-content: center; align-items: flex-start; padding-top: 15px; box-shadow: 0 -5px 15px rgba(0,0,0,0.4);">
                <div style="background: #BDC3C7; border: 4px solid #7F8C8D; border-radius: 10px; padding: 10px; width: 100px; height: 80px; box-shadow: 0 5px 15px rgba(0,0,0,0.4);">
                    <div style="background: #2C3E50; width: 100%; height: 25px; border-radius: 5px;"></div>
                </div>
            </div>
            <!-- Red Cross Overlay -->
            <div id="mock-kasir-cross" style="opacity: 0; transition: opacity 0.5s ease; position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 10rem; color: #E74C3C; text-shadow: 0 0 30px rgba(0,0,0,0.8); z-index: 4; font-weight: bold;">❌</div>
        </div>
    </div>

    <!-- Mock Rak Toko (In front of the speech bubble) -->
    <div id="mock-ui" style="opacity: 0; transition: opacity 1s ease; position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 4; pointer-events: none;">
        <div id="mock-rak" style="position: absolute; top: 20px; left: 20px; background: #F1C40F; color: #B7950B; padding: 15px 25px; border-radius: 30px; font-weight: bold; font-size: 1.4rem; box-shadow: 0 4px 15px rgba(0,0,0,0.4); border: 3px solid white; transition: all 0.3s ease;">
            🛒 Pergi ke Rak Toko
        </div>
        
        <div id="mock-rak-indicator" style="opacity: 0; transition: opacity 0.5s ease; position: absolute; top: 110px; left: 60px; display: flex; flex-direction: column; align-items: center;">
            <div style="font-size: 4rem; animation: bounceIndicator 0.6s infinite alternate; filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));">⬆️</div>
        </div>
    </div>
\n    <div id="scene-container">
        <!-- Karakter Peri Pemandu -->
        <div id="fairy-container">
            <img src="aset student/peri-pemandu.png" alt="Peri Pemandu">
        </div>

        <!-- Balon Kata (Speech Bubble) -->
        <div id="speech-bubble">
            <div id="speaker-name">Peri Pemandu</div>
            <p id="dialogue-text"></p>
            <div id="continue-hint">▶ Klik untuk lanjut</div>
            <a href="kuis-belanja.html" id="btn-mulai" class="btn-mulai" style="display:none;">Mulai Belanja! 🛒</a>
        </div>
    </div>

    <!-- Lapisan transparan untuk mendeteksi klik layar -->
    <div id="click-layer"></div>

    <script src="../shared/js/utils.js"></script>
    <script src="js/instruksi-toko.js"></script>
</body>
</html>
